<script>
        function selectMood(element) {
            // Remove active classes from all
            document.querySelectorAll('button[onclick="selectMood(this)"]').forEach(btn => {
                btn.querySelector('span:first-child').style.fontVariationSettings = "'FILL' 0";
                btn.querySelector('span:last-child').style.opacity = '0';
            });
            
            // Add active state to clicked
            const icon = element.querySelector('span:first-child');
            const label = element.querySelector('span:last-child');
            icon.style.fontVariationSettings = "'FILL' 1";
            label.style.opacity = '1';
            
            // Visual feedback
            element.style.transform = 'scale(1.1)';
            setTimeout(() => {
                element.style.transform = 'scale(1)';
            }, 300);
        }

        // Parallax effect for the background
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const background = document.querySelector('img.object-cover');
            background.style.transform = `scale(1.15) translate(${x * 10}px, ${y * 10}px)`;
            
            const glow1 = document.querySelector('.organic-glow:first-child');
            glow1.style.transform = `translate(${-x * 50}px, ${-y * 50}px)`;
        });

        // Soft reveal on scroll
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('fade-in-up');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('section').forEach(section => {
            observer.observe(section);
        });
    </script>
