<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        :root {
            --antonia-terracotta: #C17B5E;
            --mape-eucalyptus: #5F7464;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background-color: #fff8f5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }

        .glass-card {
            backdrop-filter: blur(40px);
            background: rgba(255, 248, 245, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* 1. Generative Background Animation */
        .liquid-gradient-bg {
            background: linear-gradient(135deg, #fff8f5 0%, #f4ece8 50%, #fff8f5 100%);
            background-size: 400% 400%;
            animation: liquidShift 15s ease infinite;
        }

        @keyframes liquidShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Floating Animations */
        .float-slow {
            animation: float 8s ease-in-out infinite;
        }

        .float-delayed {
            animation: float 10s ease-in-out infinite;
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* 3. Entrance Animations */
        .entrance-reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .organic-glow {
            filter: blur(80px);
            opacity: 0.35;
            mix-blend-mode: multiply;
        }

        /* 4. Active States */
        .liquid-button {
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .liquid-button:active {
            transform: scale(0.92) !important;
        }

        .nav-item-active:active {
            transform: scale(0.85);
        }

        .breath-pulse {
            animation: breath 12s ease-in-out infinite;
        }

        @keyframes breath {
            0%, 100% { transform: scale(1); opacity: 0.25; }
            50% { transform: scale(1.1); opacity: 0.45; }
        }
    </style>

<script>
        function selectMood(element) {
            // Reset others
            document.querySelectorAll('button[onclick="selectMood(this)"]').forEach(btn => {
                const icon = btn.querySelector('span:first-child');
                const label = btn.querySelector('span:last-child');
                icon.style.fontVariationSettings = "'FILL' 0";
                icon.classList.remove('text-antonia-terracotta', 'text-mape-eucalyptus', 'text-amber-600', 'text-indigo-400', 'text-rose-400');
                label.style.opacity = '0';
            });
            
            // Set active
            const icon = element.querySelector('span:first-child');
            const label = element.querySelector('span:last-child');
            icon.style.fontVariationSettings = "'FILL' 1";
            label.style.opacity = '1';
            
            // Subtle pop animation
            element.style.transform = 'scale(1.2)';
            setTimeout(() => {
                element.style.transform = '';
            }, 400);
        }

        // Parallax and Mouse Interactions
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            
            const background = document.querySelector('img.object-cover');
            if(background) {
                background.style.transform = `scale(1.15) translate(${x * 20}px, ${y * 20}px)`;
            }
            
            const glows = document.querySelectorAll('.organic-glow');
            glows.forEach((glow, index) => {
                const depth = (index + 1) * 30;
                glow.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
            });
        });

        // Initialize entrance sequence
        document.addEventListener('DOMContentLoaded', () => {
            // Entrance animations are handled by CSS classes 'entrance-reveal'
            // Added staggered delays in-line for visual richness
        });
    </script>
